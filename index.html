<!DOCTYPE html>
<html lang="bn" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>Unicode ⇄ Bijoy Converter</title>
<meta name="description" content="A fast, offline, accurate Bangla Unicode ↔ Bijoy (ANSI) text converter. Premium glass interface, dark &amp; light themes.">

<!-- Tiny inline favicon so the tab looks finished without an extra asset -->
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='16' fill='%23000'/%3E%3Ccircle cx='24' cy='32' r='14' fill='%2300E5FF'/%3E%3Ccircle cx='40' cy='32' r='14' fill='%2334D399' fill-opacity='0.85'/%3E%3C/svg%3E">

<!--
  ============================================================================
  THEME BOOTSTRAP
  Runs before first paint so the saved theme (dark/light) applies instantly
  with no flash-of-wrong-theme. Kept tiny and dependency-free on purpose.
  ============================================================================
-->
<script>
  (function () {
    try {
      var saved = localStorage.getItem('ub_converter_theme');
      document.documentElement.setAttribute('data-theme', saved === 'light' ? 'light' : 'dark');
    } catch (e) {
      document.documentElement.setAttribute('data-theme', 'dark');
    }
  })();
</script>

<!-- Fonts: self-hosted, zero network dependency (see css/fonts.css) -->
<link rel="stylesheet" href="css/fonts.css">

<link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- Ambient background glow, purely decorative -->
<div class="bg-glow" aria-hidden="true"></div>
<div class="bg-grain" aria-hidden="true"></div>

<!-- ============================================================
     HEADER — glass navbar
     ============================================================ -->
<header class="navbar">
  <div class="navbar-inner">

    <div class="brand">
      <span class="logo-mark" aria-hidden="true">
        <span class="logo-blob logo-blob--u"></span>
        <span class="logo-blob logo-blob--b"></span>
        <span class="logo-glyph">ব</span>
      </span>
      <div class="brand-text">
        <strong>Unicode <span class="brand-arrow">⇄</span> Bijoy</strong>
        <small>Converter</small>
      </div>
      <span class="toolbox-tag">Toha toolbox</span>
    </div>

    <div class="navbar-actions">
      <button class="auto-toggle is-on" id="autoConvertToggle" type="button" aria-pressed="true" title="অটো কনভার্ট চালু/বন্ধ">
        <span class="auto-toggle-label">অটো কনভার্ট</span>
        <span class="toggle-track"><span class="toggle-thumb"></span></span>
      </button>

      <a class="pill-btn" href="https://www.facebook.com/toha.khan.923519/" target="_blank" rel="noopener noreferrer" aria-label="Visit Facebook profile">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor" stroke="none"><path d="M22 12.06C22 6.5 17.52 2 12 2S2 6.5 2 12.06c0 5.02 3.66 9.18 8.44 9.94v-7.03H7.9v-2.9h2.54V9.85c0-2.52 1.49-3.91 3.78-3.91 1.1 0 2.24.2 2.24.2v2.47h-1.26c-1.24 0-1.63.78-1.63 1.57v1.88h2.78l-.44 2.9h-2.34V22c4.78-.76 8.44-4.92 8.44-9.94Z"/></svg>
        <span>Facebook</span>
      </a>

      <button class="theme-toggle" id="themeToggle" type="button" aria-label="Toggle light and dark theme" aria-pressed="false">
        <svg class="icon-sun" viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4 12H2M22 12h-2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>
        <span class="toggle-track"><span class="toggle-thumb"></span></span>
        <svg class="icon-moon" viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 14.5A8.5 8.5 0 1 1 9.5 4a7 7 0 0 0 10.5 10.5Z"/></svg>
      </button>
    </div>

  </div>
</header>

<!-- ============================================================
     MAIN WORKSPACE — two glass panels + a control rail
     Both panels always stay visible; the rail reflows instead
     of hiding either box on small screens.
     ============================================================ -->
<main class="workspace">

  <!-- ---------- UNICODE PANEL ---------- -->
  <section class="panel panel--unicode" data-panel="unicode">
    <header class="panel-header">
      <div class="panel-title">
        <span class="dot" aria-hidden="true">🟦</span>
        <h2>Unicode Text</h2>
      </div>
      <div class="panel-tools">
        <button class="icon-btn" id="pasteUnicode" type="button" title="Paste" aria-label="Paste into Unicode box">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="6" y="4" width="12" height="17" rx="2"/><rect x="9" y="2" width="6" height="4" rx="1"/></svg>
        </button>
      </div>
    </header>

    <div class="textarea-wrap">
      <textarea
        id="uniText"
        class="text-input text-input--unicode"
        placeholder="বাংলা ইউনিকোড লেখা লিখুন বা পেস্ট করুন..."
        spellcheck="false"
        autocapitalize="off"
        autocomplete="off"></textarea>
    </div>

    <footer class="panel-footer">
      <div class="stats">
        <span><b id="uniChars">0</b> অক্ষর</span>
        <span><b id="uniWords">0</b> শব্দ</span>
        <span><b id="uniLines">0</b> লাইন</span>
      </div>
      <button class="btn btn--copy display-none" id="copyUnicode" type="button">
        <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="8" y="8" width="12" height="12" rx="2"/><path d="M5 15V5a2 2 0 0 1 2-2h10"/></svg>
        <span>Copy Unicode</span>
      </button>
    </footer>
  </section>

  <!-- ---------- CONTROL RAIL ---------- -->
  <div class="control-rail">
    <div class="flow-line" id="flowLine" aria-hidden="true">
      <span class="flow-dot" id="flowDot"></span>
    </div>

    <button class="btn btn--primary btn--rail" id="btnToBijoy" type="button" title="Unicode → Bijoy  (Ctrl+Enter)">
      <svg viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12h16M14 6l6 6-6 6"/></svg>
      <span>Bijoy</span>
    </button>

    <button class="btn btn--ghost btn--rail btn--swap" id="btnSwap" type="button" title="Swap boxes">
      <svg viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 3v14M7 17l-3.5-3.5M7 17l3.5-3.5"/><path d="M17 21V7M17 7l3.5 3.5M17 7l-3.5 3.5"/></svg>
    </button>

    <button class="btn btn--primary btn--rail btn--reverse" id="btnToUnicode" type="button" title="Bijoy → Unicode  (Ctrl+Enter)">
      <svg viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 12H4M10 6l-6 6 6 6"/></svg>
      <span>Unicode</span>
    </button>

    <button class="btn btn--danger btn--rail" id="btnClearAll" type="button" title="Clear all  (Esc)">
      <svg viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 7h16"/><path d="M9 7V4h6v3"/><path d="M6 7l1 13a2 2 0 0 0 2 2h6a2 2 0 0 0 2-2l1-13"/></svg>
      <span>Clear</span>
    </button>
  </div>

  <!-- ---------- BIJOY PANEL ---------- -->
  <section class="panel panel--bijoy" data-panel="bijoy">
    <header class="panel-header">
      <div class="panel-title">
        <span class="dot" aria-hidden="true">🟩</span>
        <h2>Bijoy Text</h2>
      </div>
      <div class="panel-tools">
        <button class="icon-btn" id="pasteBijoy" type="button" title="Paste" aria-label="Paste into Bijoy box">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="6" y="4" width="12" height="17" rx="2"/><rect x="9" y="2" width="6" height="4" rx="1"/></svg>
        </button>
      </div>
    </header>

    <div class="textarea-wrap">
      <textarea
        id="bijoyText"
        class="text-input text-input--bijoy"
        placeholder="বিজয় লেখা এখানে দেখা যাবে..."
        spellcheck="false"
        autocapitalize="off"
        autocomplete="off"></textarea>
    </div>

    <footer class="panel-footer">
      <div class="stats">
        <span><b id="bijoyChars">0</b> অক্ষর</span>
        <span><b id="bijoyWords">0</b> শব্দ</span>
        <span><b id="bijoyLines">0</b> লাইন</span>
      </div>
      <button class="btn btn--copy display-none" id="copyBijoy" type="button">
        <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="8" y="8" width="12" height="12" rx="2"/><path d="M5 15V5a2 2 0 0 1 2-2h10"/></svg>
        <span>Copy Bijoy</span>
      </button>
    </footer>
  </section>

</main>

<!-- Keyboard shortcut hint strip -->
<div class="shortcut-hint">
  <span><kbd>Ctrl</kbd>+<kbd>Enter</kbd> কনভার্ট</span>
  <span><kbd>Ctrl</kbd>+<kbd>Shift</kbd>+<kbd>C</kbd> কপি আউটপুট</span>
  <span><kbd>Esc</kbd> ক্লিয়ার</span>
</div>

<!-- ============================================================
     FOOTER
     ============================================================ -->
<footer class="site-footer">
  <p>Made with <span class="heart" aria-hidden="true">❤️</span><span class="sr-only">love</span>
    &nbsp;·&nbsp; Fast &nbsp;·&nbsp; Offline &nbsp;·&nbsp; Accurate</p>
</footer>

<!-- Toast notifications (copy / paste / clear feedback) -->
<div class="toast" id="toast" role="status" aria-live="polite"></div>

<!-- ============================================================
     SCRIPTS
     jQuery is required because fontconverter.js is written against it.
     Load order matters: jQuery → fontconverter.js (untouched, source of
     truth for all conversion logic) → app.js (UI wiring only).
     ============================================================ -->
<script src="js/vendor/jquery.min.js"></script>
<script src="js/fontconverter.js"></script>
<script src="js/app.js"></script>
</body>
</html>
